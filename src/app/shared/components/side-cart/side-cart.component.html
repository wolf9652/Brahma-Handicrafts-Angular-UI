<div class="fixed right-0 top-0 z-40 h-full w-full max-w-md bg-white shadow-2xl transition-transform" [class.translate-x-full]="!cartService.isCartOpen()" [class.translate-x-0]="cartService.isCartOpen()">
  <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
    <h2 class="text-lg font-semibold">Your Cart</h2>
    <button type="button" class="text-sm text-slate-500" (click)="cartService.toggleCart()">Close</button>
  </div>

  <div class="flex h-[calc(100%-8rem)] flex-col gap-4 overflow-y-auto px-6 py-4">
    <div *ngIf="cartService.items().length === 0" class="rounded-lg bg-slate-50 p-4 text-sm text-slate-600">
      Your cart is empty.
    </div>

    <div *ngFor="let item of cartService.items()" class="rounded-lg border border-slate-200 p-4">
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="font-medium">{{ item.product.name }}</p>
          <p class="text-sm text-slate-500">Qty {{ item.quantity }}</p>
        </div>
        <span class="text-sm font-semibold text-amber-700">₹{{ item.product.price * item.quantity }}</span>
      </div>
    </div>
  </div>

  <div class="border-t border-slate-200 px-6 py-4">
    <div class="mb-3 flex items-center justify-between text-sm text-slate-600">
      <span>Total</span>
      <span class="font-semibold text-slate-900">₹{{ cartService.getTotal() }}</span>
    </div>
    <a routerLink="/checkout" class="block rounded-full bg-amber-700 px-4 py-2 text-center text-sm font-semibold text-white" (click)="cartService.toggleCart()">Proceed to Checkout</a>
  </div>
</div>
