<div *ngIf="authService.isUserDropdownOpen()" class="fixed right-4 top-16 z-50 w-56 rounded-2xl border border-slate-200 bg-white p-4 shadow-xl">
  <div class="mb-3 text-sm text-slate-600">
    <p class="font-semibold text-slate-900">{{ authService.userName() }}</p>
    <p>{{ authService.userEmail() }}</p>
  </div>
  <button type="button" class="w-full rounded-full border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700" (click)="authService.logout()">
    Sign out
  </button>
</div>
