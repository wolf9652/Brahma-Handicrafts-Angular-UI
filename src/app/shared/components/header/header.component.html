<header class="border-b border-amber-200 bg-[#fff8ef] shadow-sm">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    <a routerLink="/" class="flex items-center gap-3 text-amber-900">
      <img src="/assets/photos/BH-logo.png" alt="Brahma Handicrafts logo" class="h-10 w-10 rounded-full object-cover" />
      <span class="text-xl font-semibold tracking-wide">Brahma Handicrafts</span>
    </a>

    <nav class="hidden items-center gap-6 text-sm font-medium text-slate-700 md:flex">
      <a routerLink="/" routerLinkActive="text-amber-700" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/products" routerLinkActive="text-amber-700">Products</a>
      <a routerLink="/about-us" routerLinkActive="text-amber-700">About</a>
      <a routerLink="/faq" routerLinkActive="text-amber-700">FAQ</a>
      <a routerLink="/shipping" routerLinkActive="text-amber-700">Shipping</a>
    </nav>

    <div class="flex items-center gap-3">
      <a routerLink="/wishlist" class="rounded-full border border-amber-300 px-3 py-2 text-sm font-medium text-amber-800">Wishlist</a>
      <a routerLink="/checkout" class="rounded-full bg-amber-700 px-3 py-2 text-sm font-medium text-white">Cart</a>
      <a routerLink="/admin" class="rounded-full border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700">Admin</a>
     <button type="button" (click)="openLogin()" class="cursor-pointer rounded-full bg-amber-700 px-3 py-2 text-sm font-medium text-white">
  Login/Signup
</button>
    </div>
  </div>

  <p-dialog 
  [(visible)]="showLoginDialog" 
  [modal]="true" 
  [closable]="true" 
  [dismissableMask]="true"
  [style]="{width: '400px'}"
  appendTo="body"
  [contentStyle]="{'padding':'0'}"
  (onHide)="closeLogin()"
>
  <app-auth></app-auth>
</p-dialog>
</header>
